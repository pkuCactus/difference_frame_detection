rtsp:
  url: "rtsp://192.168.1.100:554/stream"
  reconnect_interval_ms: 3000

camera_detection:
  enabled: true
  protocol: "REST"
  endpoint: "http://192.168.1.100/api/detection"
  poll_interval_ms: 100
  camera_id: "camera_001"
  camera_host: "192.168.1.100"
  camera_port: 80
  capability_url: "/api/capability"
  timeout_ms: 3000

local_detection:
  model_path: "/data/models/yolov8.rknn"
  model_type: "yolov8"
  conf_threshold: 0.5
  detect_interval: 3
  timeout_ms: 500

tracker:
  enabled: true
  confirm_frames: 3
  max_lost_frames: 30
  high_threshold: 0.5
  low_threshold: 0.1
  match_threshold: 0.5

ref_frame:
  similarity_threshold: 0.85
  compare_method: "ssim"
  update_strategy: "newest"
  compare_roi_only: false

event_analysis:
  mode: "image"
  video_duration_sec: 5

logging:
  level: "INFO"
  file_path: "/tmp/pipeline.log"