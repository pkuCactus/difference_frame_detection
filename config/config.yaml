rtsp:
  url: "rtsp://10.42.0.1:8554/stream1"
  reconnect_interval_ms: 3000

camera_detection:
  enabled: false
  protocol: "REST"
  endpoint: "http://192.168.1.100/api/detection"
  poll_interval_ms: 100
  camera_id: "camera_001"
  camera_host: "192.168.1.100"
  camera_port: 80
  capability_url: "/api/capability"
  timeout_ms: 3000

local_detection:
  model_path: "models/yolov5s_rk3566.rknn"
  model_type: "yolov5"
  letter_box: true
  conf_threshold: 0.5
  nms_threshold: 0.3
  detect_interval: 3
  timeout_ms: 500

tracker:
  enabled: true
  confirm_frames: 3
  max_lost_frames: 30
  high_threshold: 0.5
  low_threshold: 0.1
  match_threshold: 0.5

ref_frame:
  similarity_threshold: 0.85
  compare_method: "ssim"
  update_strategy: "newest"
  compare_roi_only: true

event_analysis:
  mode: "image"
  video_duration_sec: 5

logging:
  level: "INFO"
  file_path: "outputs/pipeline.log"